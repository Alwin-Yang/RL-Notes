site_name: RL Notes
site_description: Reinforcement learning notes, from foundations to practice.
repo_name: Alwin-Yang/RL-Notes
repo_url: https://github.com/Alwin-Yang/RL-Notes
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Zewen Yang
extra:
  generator: false
theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: pink
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.highlight
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
extra_css:
  - stylesheets/extra.css
nav:
  - Home: index.md
  - Foundations:
      - Overview: foundations/index.md
      - Q&A: foundations/Q&A.md
  - Value-Based RL:
      - Overview: value-based/index.md
      - Q&A: value-based/Q&A.md
  - Policy Optimization:
      - Overview: policy-optimization/index.md
      - Q&A: policy-optimization/Q&A.md
  - Actor-Critic:
      - Overview: actor-critic/index.md
      - Q&A: actor-critic/Q&A.md
  - Advanced Topics:
      - Overview: advanced/index.md
      - Q&A: advanced/Q&A.md
  - Practice:
      - Overview: practice/index.md
      - Q&A: practice/Q&A.md
  - References:
      - Reading list: references/index.md
      - Q&A: references/Q&A.md
